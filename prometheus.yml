global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── Akuner Life Sciences CRM — Spring Boot Backend ───────────
  # Scrapes /actuator/prometheus every 15 seconds
  # Micrometer registry-prometheus exposes metrics in Prometheus format
  # 'app' is the Docker service name — resolves via akuner_network
  - job_name: 'akuner-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']