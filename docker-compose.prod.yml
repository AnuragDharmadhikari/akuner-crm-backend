# docker-compose.prod.yml
# Production stack — runs on the VPS
# Images are pre-built by GitHub Actions and stored on Docker Hub
# The VPS only pulls and runs — it never builds from source

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: akuner_db_prod
    environment:
      POSTGRES_DB: akuner
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d akuner"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - akuner_network

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: akuner_cache_prod
    restart: unless-stopped
    networks:
      - akuner_network

  # ── Spring Boot Backend ─────────────────────────────────────
  app:
    image: ${DOCKERHUB_USERNAME}/akuner-backend:latest
    container_name: akuner_app_prod
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/akuner
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      OWNER_EMAIL: ${OWNER_EMAIL}
      OWNER_PASSWORD: ${OWNER_PASSWORD}
      OWNER_FULL_NAME: ${OWNER_FULL_NAME}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - akuner_network

  # ── React Frontend ──────────────────────────────────────────
  frontend:
    image: ${DOCKERHUB_USERNAME}/akuner-frontend:latest
    container_name: akuner_frontend_prod
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - akuner_network

  # ── Caddy — HTTPS Reverse Proxy ─────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: akuner_caddy_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - akuner_network

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: akuner_prometheus_prod
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - akuner_network

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: akuner_grafana_prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    networks:
      - akuner_network

  # ── Loki — Log Aggregation ────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: akuner_loki_prod
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - akuner_network

  # ── Promtail — Log Collector Agent ───────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    container_name: akuner_promtail_prod
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - akuner_network
    depends_on:
      - loki

networks:
  akuner_network:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
  caddy_data:
  caddy_config:
  loki_data: