services:

  # ── PostgreSQL Database ───────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: vedpharm_db
    environment:
      POSTGRES_DB: vedpharm
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d vedpharm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vedpharm_network

  # ── Redis Cache ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vedpharm_cache
    restart: unless-stopped
    networks:
      - vedpharm_network

  # ── Spring Boot Backend ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vedpharm_app
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/vedpharm
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - vedpharm_network

  # ── React Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ../vedpharm-frontend
      dockerfile: Dockerfile
    container_name: vedpharm_frontend
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - vedpharm_network

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: vedpharm_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - vedpharm_network

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: vedpharm_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - vedpharm_network

networks:
  vedpharm_network:
    driver: bridge

volumes:
  postgres_data:
  grafana_data: