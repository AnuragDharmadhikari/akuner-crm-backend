spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/akuner}
    username: ${SPRING_DATASOURCE_USERNAME:akuner_user}
    password: ${SPRING_DATASOURCE_PASSWORD:akuner_pass}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  flyway:
    enabled: false

application:
  jwt:
    secret: ${JWT_SECRET:SyPKjFZSlcrmHNcEb5/ZvGJo2RQFQFZK1eS33ugNN9A=}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

openai:
  api-key: ${OPENAI_API_KEY:test-key}
  model: gpt-4o-mini
  max-tokens: 1000
  timeout-seconds: 30

akuner:
  company:
    state: Maharashtra