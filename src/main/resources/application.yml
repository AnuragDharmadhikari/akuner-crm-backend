spring:
  application:
    name: VedPharm CRM

  datasource:
    url: jdbc:postgresql://localhost:5432/vedpharm
    username: vedpharm_user
    password: vedpharm_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      lifecycle-management: start-and-stop

  # ── Redis Connection ──────────────────────────────────────────────────────────
  # Spring Boot auto-connects to Redis using these coordinates
  # Host is localhost because Docker Compose exposes Redis on host port 6379
  # This is the same Redis instance already used by LoginRateLimiter in Phase 3
  data:
    redis:
      host: localhost
      port: 6379

  # ── Cache Configuration ───────────────────────────────────────────────────────
  # Tells Spring to use Redis as the cache provider
  # Without this, @Cacheable defaults to ConcurrentHashMap (in-memory, not shared)
  cache:
    type: redis
    redis:
      # Default TTL for ALL cache entries — 1 hour in milliseconds
      # Individual caches can override this but we use 1h for all analytics
      # After 1 hour Redis automatically evicts the entry
      # Next request recomputes from DB and caches fresh result
      time-to-live: 3600000

server:
  port: 8080

application:
  jwt:
    secret: 7A6F4A9B2C8D3E1F5A7B9C0D2E4F6A8B1C3D5E7F9A0B2C4D6E8F0A1B3C5D7E9F
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

vedpharm:
  company:
    state: Maharashtra

logging:
  level:
    org.springframework.data.repository.config.RepositoryConfigurationExtensionSupport: ERROR