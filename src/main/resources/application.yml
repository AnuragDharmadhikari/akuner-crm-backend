spring:
  application:
    name: AkunerCRM

  profiles:
    active: local

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:akunarlc9@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password-here}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  datasource:
    url: jdbc:postgresql://localhost:5432/vedpharm
    username: ${DB_USERNAME:your-username-key-goes-in-application-local.yml}
    password: ${DB_PASSWORD:your-password-key-goes-in-application-local.yml}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  docker:
    compose:
      lifecycle-management: none

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 3600000

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: Akuner CRM
    version: 1.0.0
    description: Pharmaceutical Sales Management Platform

application:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-goes-in-application-local.yml}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000
  owner:
    email: ${OWNER_EMAIL:owner@akuner.in}
    password: ${OWNER_PASSWORD:changeme123}
    full-name: ${OWNER_FULL_NAME:Akuner Owner}

vedpharm:
  company:
    state: Maharashtra

# ── OpenAI Configuration ──────────────────────────────────────────────────────
# api-key lives in application-local.yml which is gitignored — never pushed
# model: gpt-4o-mini — cheapest, fastest, sufficient for all 6 AI features
# max-tokens: 1000 — hard cap per call — controls cost
# timeout-seconds: 30 — AI calls can be slow — don't let them hang forever
openai:
  api-key: ${OPENAI_API_KEY:your-key-goes-in-application-local.yml}
  model: gpt-4o-mini
  max-tokens: 1000
  timeout-seconds: 30

logging:
  level:
    org.springframework.data.repository.config.RepositoryConfigurationExtensisupport: ERROR
    org.ved.crm.billing: DEBUG
    org.ved.crm.email: DEBUG