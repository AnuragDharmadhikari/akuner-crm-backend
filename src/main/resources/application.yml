spring:
  application:
    name: VedPharm CRM

  datasource:
    url: jdbc:postgresql://localhost:5432/vedpharm
    username: vedpharm_user
    password: vedpharm_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      lifecycle-management: start-and-stop

server:
  port: 8080

application:
  jwt:
    secret: 7A6F4A9B2C8D3E1F5A7B9C0D2E4F6A8B1C3D5E7F9A0B2C4D6E8F0A1B3C5D7E9F
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

vedpharm:
  company:
    state: Maharashtra

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG