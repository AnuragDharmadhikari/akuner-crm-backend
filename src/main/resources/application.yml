spring:
  application:
    name: VedPharm CRM

  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://localhost:5432/vedpharm
    username: vedpharm_user
    password: vedpharm_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      lifecycle-management: none

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 3600000

server:
  port: 8080

application:
  jwt:
    secret: 7A6F4A9B2C8D3E1F5A7B9C0D2E4F6A8B1C3D5E7F9A0B2C4D6E8F0A1B3C5D7E9F
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

vedpharm:
  company:
    state: Maharashtra

# ── OpenAI Configuration ──────────────────────────────────────────────────────
# api-key lives in application-local.yml which is gitignored — never pushed
# model: gpt-4o-mini — cheapest, fastest, sufficient for all 6 AI features
# max-tokens: 1000 — hard cap per call — controls cost
# timeout-seconds: 30 — AI calls can be slow — don't let them hang forever
openai:
  api-key: your-key-goes-in-application-local.yml
  model: gpt-4o-mini
  max-tokens: 1000
  timeout-seconds: 30

logging:
  level:
    org.springframework.data.repository.config.RepositoryConfigurationExtensisupport: ERROR